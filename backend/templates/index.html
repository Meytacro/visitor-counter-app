<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>visitcounterapp</title>

    <!-- Open Graph -->
    <meta property="og:title" content="visitcounterapp">
    <meta property="og:description" content="Simple cloud app deployed with AWS, Docker and Terraform">
    <meta property="og:image" content="https://visitcounterapp.com/static/preview.png">
    <meta property="og:url" content="https://visitcounterapp.com">
    <meta property="og:type" content="website">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="visitcounterapp">
    <meta name="twitter:description" content="Simple cloud app deployed with AWS, Docker and Terraform">
    <meta name="twitter:image" content="https://visitcounterapp.com/static/preview.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/navigator_logo.png">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            max-width: 700px;
            padding: 30px;
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
        }

        .subtitle {
            margin-top: 15px;
            color: #cbd5e1;
            font-size: 1.2rem;
        }

        .counter-box {
            margin-top: 40px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(2, 6, 23, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        .counter-label {
            color: #94a3b8;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        #counter {
            font-size: 4rem;
            font-weight: bold;
            color: #38bdf8;
            margin-top: 10px;
        }

        .stack {
            margin-top: 30px;
        }

        .stack span {
            display: inline-block;
            margin: 5px;
            padding: 8px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            font-size: 0.9rem;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .stack span:hover {
            transform: translateY(-3px);
            background: rgba(59, 130, 246, 0.25);
        }

        footer {
            margin-top: 30px;
            color: #64748b;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            #counter {
                font-size: 4rem;
                font-weight: bold;
                color: #38bdf8;
                margin-top: 10px;
                transition: transform 0.2s ease;
            }

            #counter.updated {
                transform: scale(1.08);
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="badge">Cloud project</div>

        <h1>Visitor Counter 🚀</h1>

        <p class="subtitle">
            A simple visitor counter app built with Flask, Docker, AWS, Terraform and Redis on ElastiCache.
        </p>

        <div class="counter-box">
            <div class="counter-label">CURRENT VISITS</div>
            <div id="counter">Loading...</div>
        </div>

        <div class="stack">
            <span>Python Flask</span>
            <span>Docker</span>
            <span>AWS EC2</span>
            <span>Terraform</span>
            <span>ElastiCache Redis</span>
        </div>

        <footer>
            Built as a hands-on Cloud & DevOps learning project.
        </footer>

    </div>

    <script>
        function animateCounter(finalValue) {
            const counter = document.getElementById("counter");
            const duration = 700;
            const start = 0;
            const startTime = performance.now();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const value = Math.floor(start + (finalValue - start) * progress);

                counter.textContent = value;

                if (progress < 1) {
                    requestAnimationFrame(update);
                } else {
                    counter.textContent = finalValue;
                    counter.classList.add("updated");

                    setTimeout(() => {
                        counter.classList.remove("updated");
                    }, 250);
                }
            }

            requestAnimationFrame(update);
        }

        async function loadVisits() {
            try {
                const response = await fetch("/visits");
                const data = await response.json();
                animateCounter(data.visits);
            } catch (error) {
                document.getElementById("counter").textContent = "Error";
            }
        }

        loadVisits();
    </script>
</body>
</html>
